# Production Docker Compose — clean start with setup wizard
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# First visit → setup wizard → configure trip, admin, boats, crew
# No seed data — starts with empty database

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://crewsplit:${POSTGRES_PASSWORD:-crewsplit}@db:5432/crewsplit
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-a-random-64-char-hex-string-for-production}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crewsplit
      POSTGRES_USER: crewsplit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crewsplit}
    volumes:
      # Only schema — no seed data. Setup wizard handles initial data.
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - crewsplit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crewsplit -d crewsplit"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  crewsplit_pgdata:
